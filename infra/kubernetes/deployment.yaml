apiVersion: v1
kind: Namespace
metadata:
  name: teamos
  labels:
    istio-injection: enabled
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: teamos-backend
  namespace: teamos
spec:
  replicas: 3
  selector:
    matchLabels:
      app: teamos-backend
  template:
    metadata:
      labels:
        app: teamos-backend
    spec:
      containers:
      - name: backend
        image: teamos/backend:latest
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: teamos-config
        - secretRef:
            name: teamos-secrets
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: teamos-backend
  namespace: teamos
spec:
  ports:
  - name: http
    port: 3000
    targetPort: 3000
  selector:
    app: teamos-backend
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: teamos-ingress
  namespace: teamos
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
  - host: api.teamos.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: teamos-backend
            port:
              number: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: teamos-backend-hpa
  namespace: teamos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: teamos-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: teamos
spec:
  mtls:
    mode: STRICT
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: teamos-backend-routes
  namespace: teamos
spec:
  hosts:
  - teamos-backend
  http:
  - route:
    - destination:
        host: teamos-backend
        subset: v1
      weight: 90
    - destination:
        host: teamos-backend
        subset: v2
      weight: 10
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-policy
  namespace: teamos
spec:
  podSelector:
    matchLabels:
      app: teamos-backend
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: teamos
    ports:
    - protocol: TCP
      port: 3000
