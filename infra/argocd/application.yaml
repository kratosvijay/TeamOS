apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: teamos-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/teamos/gitops-infra.git'
    targetRevision: HEAD
    path: infra/kubernetes
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: teamos
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
