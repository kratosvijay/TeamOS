name: teamos_app
description: TeamOS Enterprise Collaboration Platform Mobile, Desktop, and Web Client.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^12.1.3
  flutter_hooks: ^0.20.5
  flutter_quill: ^9.2.1
  livekit_client: ^1.5.3
  socket_io_client: ^2.0.3+1
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  uuid: ^4.3.3
  intl: ^0.20.2
  fl_chart: ^0.66.0
  cached_network_image: ^3.3.1
  freezed_annotation: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.6
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
