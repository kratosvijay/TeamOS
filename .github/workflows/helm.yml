name: Helm Lint

on:
  push:
    paths:
      - 'infra/helm/**'
  pull_request:
    paths:
      - 'infra/helm/**'

jobs:
  lint-charts:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Helm
      uses: azure/setup-helm@v3
    - name: Lint charts
      run: |
        helm lint ./infra/helm/
