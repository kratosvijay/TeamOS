name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: Install dependencies
      run: |
        cd backend
        npm ci --legacy-peer-deps
    - name: Generate Prisma Client
      run: |
        cd backend
        npx prisma generate
    - name: Run Tests
      run: |
        cd backend
        npm run test
