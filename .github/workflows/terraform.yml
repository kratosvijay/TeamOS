name: Terraform Checks

on:
  push:
    paths:
      - 'infra/terraform/**'
  pull_request:
    paths:
      - 'infra/terraform/**'

jobs:
  terraform-validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v2
    - name: Initialize and Validate
      run: |
        cd infra/terraform
        terraform init -backend=false
        terraform validate
