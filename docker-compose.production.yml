version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: teamos-postgres
    environment:
      POSTGRES_DB: teamos
      POSTGRES_USER: teamos_admin
      POSTGRES_PASSWORD: SecureDBPassword123!
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: teamos-redis
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    container_name: teamos-prometheus
    volumes:
      - ./infra/otel/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: teamos-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "8889:8889"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: teamos-backend
    environment:
      DATABASE_URL: postgresql://teamos_admin:SecureDBPassword123!@postgres:5432/teamos?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - otel-collector

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: teamos-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
